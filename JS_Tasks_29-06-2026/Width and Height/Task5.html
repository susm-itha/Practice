<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>width and height</title>
</head>
<body>
    <style>
        body{
            font-family: Arial;
            margin: 20px;
        }

        .box{
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 15px;
        }

        
        .pixel-box{
            width: 150px;
            height: 30px;
            background-color: lightblue;
        }

      
        .percent-box{
            width: 20%;
            height: 20px;
            background-color: lightgreen;
        }

        
        .viewport-box{
            width: 20vw;
            height: 5vh;
            background-color: lightcoral;
        }

        
        .auto-box{
            width: auto;
            display: inline-block;
            background-color: lightyellow;
        }
    </style>
</head>

<body>

    <h2>Width and Height</h2>

    <div class="box pixel-box">
        150px x 60px
    </div>

    <div class="box percent-box">
        Width: 20%
    </div>

    <div class="box viewport-box">
        20vw x 10vh
    </div>

    <div class="box auto-box">
        Auto Size Box
    </div>
</body>
</html>
