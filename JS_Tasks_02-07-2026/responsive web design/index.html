<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive design</title>
</head>
<body>
    <style>

/* Default styles (Desktop First) */
body{
    font-family: Arial;
    padding: 30px;
}

h1{
    font-size: 40px;
}

p{
    font-size: 20px;
}

.nav{
    display: flex;
    gap: 20px;
}

img{
    width: 500px;
}

/* Tablet */
@media (max-width: 768px){
    body{
        padding: 20px;
    }

    h1{
        font-size: 30px;
    }

    p{
        font-size: 18px;
    }

    .nav{
        gap: 10px;
    }

    img{
        width: 300px;
    }
}

/* Mobile */
@media (max-width: 480px){
    body{
        padding: 10px;
    }

    h1{
        font-size: 24px;
    }

    p{
        font-size: 16px;
    }

    .nav{
        flex-direction: column;
    }

    img{
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>
<h1>Responsive Design</h1>
<p>This page changes according to screen size.</p>
</body>
</html>
