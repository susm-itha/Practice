<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
   <style>
      th, td {
      border: 1px solid #dddddd;
      text-align:left;
      padding: 12px; 
    }

  </style>
</head>
<body> 

  <h2>Employee Details</h2>

  <table>
    <head>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Role</th>
      </tr>
    </head>
    <tbody>
      <tr>
        <td>Susmitha</td>
        <td>23</td>
        <td>ASE</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
