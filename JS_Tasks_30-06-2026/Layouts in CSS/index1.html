<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
</head>
<body>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        /* ---------------- FLEXBOX NAVBAR ---------------- */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:teal;
            color:white;
            padding:15px 30px;
            flex-wrap:wrap;
        }

        .menu{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .menu a{
            color:white;
            text-decoration:none;
        }

        /* ---------------- GRID LAYOUT ---------------- */
        .grid-container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            padding:20px;
        }

        .box{
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 5px gray;
        }

        /* ---------------- FLEXBOX CARDS ---------------- */
        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:20px;
            flex-wrap:wrap;
        }

        .card{
            width:250px;
            background:white;
            padding:20px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 5px gray;
        }

        /* ---------------- Z-INDEX EXAMPLE ---------------- */
        .zindex-section{
            position:relative;
            height:250px;
            margin:40px;
        }

        .red{
            width:150px;
            height:150px;
            background:red;
            position:absolute;
            top:20px;
            left:20px;
            z-index:1;
        }

        .blue{
            width:150px;
            height:150px;
            background:blue;
            position:absolute;
            top:60px;
            left:80px;
            z-index:2;
            color:white;
        }

        .green{
            width:150px;
            height:150px;
            background:green;
            position:absolute;
            top:100px;
            left:140px;
            z-index:3;
            color:white;
        }

        /* ---------------- RESPONSIVE ---------------- */
        @media(max-width:768px){

            .grid-container{
                grid-template-columns:1fr;
            }

            .navbar{
                flex-direction:column;
                gap:10px;
            }

            .cards{
                flex-direction:column;
                align-items:center;
            }
        }
    </style>
</head>

<body>


    <!-- CSS Grid Section -->
    <div class="grid-container">
        <div class="box">Header Section</div>
        <div class="box">Main Content</div>
        <div class="box">Sidebar</div>
        <div class="box">Gallery</div>
        <div class="box">Articles</div>
        <div class="box">Footer</div>
    </div>


    <!-- Flexbox Cards -->
    <div class="cards">
        <div class="card">
            <h3>Card 1</h3>
            <p>Flexbox Item</p>
        </div>

        <div class="card">
            <h3>Card 2</h3>
            <p>Flexbox Item</p>
        </div>

        <div class="card">
            <h3>Card 3</h3>
            <p>Flexbox Item</p>
        </div>
    </div>


    <!-- z-index Example -->
    <div class="zindex-section">
        <div class="red"></div>
        <div class="blue">z-index 2</div>
        <div class="green">z-index 3</div>
    </div>


</body>
</html>
