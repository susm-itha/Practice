<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css box model</title>
</head>
<body>
    <style>

        .box1{
            width:200px;
            padding:10px;
            border:2px solid blue;
            margin:20px;
            background-color:lightyellow;
        }

        .box2{
            width:200px;
            padding:20px;
            border:5px dashed green;
            margin:30px;
            background-color:lightpink;
        }

        .box3{
            width:200px;
            padding:30px;
            border:8px dotted red;
            margin:40px;
            background-color:lightblue;
        }

    </style>
</head>

<body>

    <div class="box1">
        Box 1 - Small padding and margin
    </div>

    <div class="box2">
        Box 2 - Medium padding and margin
    </div>

    <div class="box3">
        Box 3 - Large padding and margin
    </div>

</body>
</html>
