<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mini project</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <h1>My Responsive Website</h1>
    </header>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome</h2>
        <p>This page uses Flexbox, Grid, Media Queries and more.</p>
    </section>

    <!-- Flexbox Section -->
    <section class="flex-section">
        <div class="box">Flex 1</div>
        <div class="box">Flex 2</div>
        <div class="box">Flex 3</div>
    </section>

    <!-- Grid Section -->
    <section class="grid-section">
        <div class="card">Grid 1</div>
        <div class="card">Grid 2</div>
        <div class="card">Grid 3</div>
        <div class="card">Grid 4</div>
    </section>

    <!-- Position and Z-index Example -->
    <section class="position-section">
        <div class="parent">
            <div class="red"></div>
            <div class="blue"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>Footer Section</p>
    </footer>
</body>
</html>
