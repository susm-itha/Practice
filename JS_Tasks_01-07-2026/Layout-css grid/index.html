<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
</head>
<body>
     <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            padding:20px;
        }

        /* Small container on left side */
        .page{
            width:500px;
        }

        /* Header */
        .header{
            background:lightblue;
            padding:10px;
            text-align:center;
            margin-bottom:5px;
        }

        /* Navigation using Flexbox */
        .nav{
            display:flex;
            gap:10px;
            background:lightgreen;
            padding:10px;
            margin-bottom:5px;
        }

        .nav div{
            background:white;
            padding:5px 10px;
        }

        /* Sidebar and Main using Flexbox */
        .content{
            display:flex;
            gap:5px;
            margin-bottom:5px;
        }

        .sidebar{
            width:120px;
            background:lightgray;
            padding:10px;
        }

        .main{
            flex:1;
            background:whitesmoke;
            padding:10px;
        }

        /* Cards using Flexbox */
        .cards{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:10px;
        }

        .card{
            background:lightyellow;
            padding:15px;
            border:1px solid black;
            width:90px;
            text-align:center;
        }

        /* Grid Example */
        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
            margin-top:10px;
        }

        .box{
            background:pink;
            padding:15px;
            text-align:center;
        }

        /* Footer */
        .footer{
            background:orange;
            padding:10px;
            text-align:center;
            margin-top:5px;
        }

        /* Responsive */
        @media(max-width:500px){

            .page{
                width:100%;
            }

            .content{
                flex-direction:column;
            }

            .nav{
                flex-direction:column;
            }
        }

    </style>
</head>

<body>

<div class="page">

    <div class="header">
        Header
    </div>

    <div class="nav">
        <div>Home</div>
        <div>About</div>
        <div>Contact</div>
    </div>

    <div class="content">

        <div class="sidebar">
            Sidebar
        </div>

        <div class="main">

            Main Content

            <div class="cards">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
            </div>

            <div class="grid">
                <div class="box">Grid 1</div>
                <div class="box">Grid 2</div>
                <div class="box">Grid 3</div>
                <div class="box">Grid 4</div>
            </div>

        </div>

    </div>

    <div class="footer">
        Footer
    </div>

</div>

</body>
</html>
